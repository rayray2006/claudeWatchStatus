name: ClaudeTap
options:
  bundleIdPrefix: com.fm
  deploymentTarget:
    watchOS: "11.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: NJ4Z2645XA
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  ClaudeTapWatch:
    type: application
    platform: watchOS
    sources:
      - path: ClaudeTapWatch
      - path: ClaudeTapWatch/Assets.xcassets
      - path: Shared
      - path: ClaudeTapComplication/ClaudeCharacter.swift
    dependencies:
      - target: ClaudeTapComplication
      - target: ClaudeTapNotificationService
    info:
      path: ClaudeTapWatch/Info.plist
      properties:
        CFBundleDisplayName: Nudge
        WKApplication: true
        WKRunsIndependentlyOfCompanionApp: true
        WKBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fm.nudge
        CODE_SIGN_ENTITLEMENTS: ClaudeTapWatch/ClaudeTapWatch.entitlements

  ClaudeTapComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: ClaudeTapComplication
      - path: Shared
      - path: ClaudeTapWatch/Assets.xcassets
    info:
      path: ClaudeTapComplication/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fm.nudge.widget
        CODE_SIGN_ENTITLEMENTS: ClaudeTapComplication/ClaudeTapComplication.entitlements

  ClaudeTapNotificationService:
    type: app-extension
    platform: watchOS
    sources:
      - path: ClaudeTapNotificationService
      - path: Shared/Constants.swift
      - path: Shared/TapState.swift
    info:
      path: ClaudeTapNotificationService/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fm.nudge.notifservice
        CODE_SIGN_ENTITLEMENTS: ClaudeTapNotificationService/ClaudeTapNotificationService.entitlements

schemes:
  ClaudeTapWatch:
    build:
      targets:
        ClaudeTapWatch: all
        ClaudeTapComplication: all
        ClaudeTapNotificationService: all
    run:
      config: Debug
    test:
      config: Debug
