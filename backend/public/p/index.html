<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pair your Nudge watch</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0c0c10;
            --panel: #17171d;
            --panel-2: #1f1f27;
            --text: #e8e8ef;
            --muted: #8a8a99;
            --accent: #d98a5a;
            --ok: #4caf7e;
            --err: #e05050;
            --border: #2a2a33;
        }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font: 16px -apple-system, system-ui, "SF Pro Text", sans-serif;
            min-height: 100vh;
        }
        .wrap {
            max-width: 560px;
            margin: 48px auto;
            padding: 0 24px;
        }
        h1 {
            font-size: 32px;
            margin: 0 0 4px;
            letter-spacing: -0.02em;
        }
        .subtitle { color: var(--muted); margin: 0 0 32px; }
        .panel {
            background: var(--panel);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            font: 600 22px/1 ui-monospaced, "SF Mono", monospace;
            letter-spacing: 0.4em;
            text-align: center;
            text-transform: uppercase;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            appearance: none;
            border: 0;
            padding: 14px 20px;
            border-radius: 10px;
            background: var(--accent);
            color: #0c0c10;
            font: 600 15px -apple-system, system-ui, sans-serif;
            cursor: pointer;
            transition: transform 0.08s ease, opacity 0.15s;
            width: 100%;
            margin-top: 12px;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.ghost {
            background: var(--panel-2);
            color: var(--text);
        }
        pre {
            background: var(--panel-2);
            padding: 14px 16px;
            border-radius: 10px;
            overflow-x: auto;
            font: 12px ui-monospace, "SF Mono", monospace;
            line-height: 1.5;
            white-space: pre;
            tab-size: 2;
        }
        .err { color: var(--err); font-size: 13px; margin-top: 8px; }
        .ok { color: var(--ok); font-size: 13px; margin-top: 8px; }
        .row { display: flex; gap: 10px; }
        .row button { flex: 1; }
        .hint { color: var(--muted); font-size: 13px; margin-top: 12px; }
        .step { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin: 8px 0 4px; }
        .mono { font-family: ui-monospace, "SF Mono", monospace; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Nudge</h1>
        <p class="subtitle">Pair your Apple Watch with Claude Code.</p>

        <div id="stage-enter" class="panel">
            <label for="code">Code from your watch</label>
            <input id="code" maxlength="6" autofocus placeholder="ABC123">
            <button id="submit">Pair</button>
            <p id="error" class="err" style="display: none"></p>
        </div>

        <div id="stage-done" class="panel" style="display: none">
            <p class="step">1. Copy this snippet</p>
            <pre id="snippet"></pre>
            <button id="copy">Copy to clipboard</button>

            <p class="step" style="margin-top: 28px">2. Paste into your Claude Code config</p>
            <p class="hint">Open <span class="mono">~/.claude/settings.json</span>, paste the snippet, merging with any existing <span class="mono">hooks</span> block, save.</p>

            <p class="step" style="margin-top: 28px">3. Test</p>
            <div class="row">
                <button class="ghost" data-status="working">Send working</button>
                <button class="ghost" data-status="done">Send done</button>
            </div>
            <p id="test-status" class="ok" style="display: none"></p>
        </div>
    </div>

    <script>
        const API = '/api/v1'

        const $code = document.getElementById('code')
        const $submit = document.getElementById('submit')
        const $error = document.getElementById('error')
        const $stageEnter = document.getElementById('stage-enter')
        const $stageDone = document.getElementById('stage-done')
        const $snippet = document.getElementById('snippet')
        const $copy = document.getElementById('copy')
        const $testStatus = document.getElementById('test-status')

        let apiKey = null

        function showError(msg) {
            $error.textContent = msg
            $error.style.display = 'block'
        }

        function buildSnippet(key, pushUrl) {
            const s = (status) =>
                `curl -sS -H 'Authorization: Bearer ${key}' -H 'content-type: application/json' -d '{\\"status\\":\\"${status}\\"}' ${pushUrl} >/dev/null 2>&1 &`
            return `{
  "hooks": {
    "PreToolUse": [{
      "type": "command",
      "command": "${s('working')}"
    }],
    "Stop": [{
      "type": "command",
      "command": "${s('done')}"
    }],
    "Notification": [{
      "type": "command",
      "command": "${s('approval')}"
    }]
  }
}`
        }

        async function pair() {
            const code = $code.value.trim().toUpperCase()
            if (!/^[A-Z0-9]{6}$/.test(code)) {
                showError('Enter the 6-character code shown on your watch.')
                return
            }
            $submit.disabled = true
            $error.style.display = 'none'

            try {
                const res = await fetch(`${API}/pair/${code}/claim`, { method: 'POST' })
                if (!res.ok) {
                    const body = await res.json().catch(() => ({}))
                    throw new Error(body.error || `HTTP ${res.status}`)
                }
                const data = await res.json()
                apiKey = data.key
                $snippet.textContent = buildSnippet(data.key, data.pushUrl)
                $stageEnter.style.display = 'none'
                $stageDone.style.display = 'block'
            } catch (err) {
                if (err.message === 'invalid_or_expired') {
                    showError('Code is invalid or expired. Generate a new one on your watch.')
                } else {
                    showError(err.message)
                }
                $submit.disabled = false
            }
        }

        $submit.addEventListener('click', pair)
        $code.addEventListener('keydown', (e) => { if (e.key === 'Enter') pair() })
        $code.addEventListener('input', () => {
            $code.value = $code.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6)
        })

        $copy.addEventListener('click', async () => {
            await navigator.clipboard.writeText($snippet.textContent)
            $copy.textContent = 'Copied ✓'
            setTimeout(() => ($copy.textContent = 'Copy to clipboard'), 1500)
        })

        document.querySelectorAll('button[data-status]').forEach((btn) => {
            btn.addEventListener('click', async () => {
                if (!apiKey) return
                const status = btn.dataset.status
                btn.disabled = true
                $testStatus.style.display = 'none'
                try {
                    const res = await fetch(`${API}/push`, {
                        method: 'POST',
                        headers: {
                            'content-type': 'application/json',
                            authorization: `Bearer ${apiKey}`,
                        },
                        body: JSON.stringify({ status }),
                    })
                    const data = await res.json()
                    $testStatus.textContent = `Delivered to ${data.delivered} device(s).`
                    $testStatus.style.display = 'block'
                } catch (err) {
                    $testStatus.textContent = `Failed: ${err.message}`
                    $testStatus.style.color = 'var(--err)'
                    $testStatus.style.display = 'block'
                } finally {
                    btn.disabled = false
                }
            })
        })

        // Allow ?code=ABC123 in URL for convenience.
        const urlCode = new URLSearchParams(window.location.search).get('code')
        if (urlCode) {
            $code.value = urlCode.toUpperCase()
            pair()
        }
    </script>
</body>
</html>
