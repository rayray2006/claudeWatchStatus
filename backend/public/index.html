<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e0b07">
    <meta name="description" content="A wrist tap when your coding agent finishes a task or needs your input.">
    <title>Cued · Wrist taps for your coding agent</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg:         #0e0b07;
            --bg-tint:    #13100b;
            --surface:    #1a1510;
            --surface-2:  #221c15;
            --border:     #2b251c;
            --border-2:   #3c3528;
            --ink:        #fbf6ee;
            --ink-dim:    #d9d1c2;
            --ink-muted:  #9a8f7c;
            --ink-faint:  #5e5446;
            --claude:      #cc785c;
            --claude-2:    #d97757;
            --claude-3:    #b85c3f;
            --claude-soft: rgba(204, 120, 92, 0.14);
            --ok:         #92dd6a;
            --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 16px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'ss01', 'ss03';
        }
        body {
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* Top nav — brand pinned to viewport top-left; nav reserves breathing room */
        nav.top { height: 72px; }
        .brand {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mascot {
            width: 32px;
            height: 32px;
            background: var(--claude);
            border-radius: 8px;
            position: relative;
        }
        .mascot::before,
        .mascot::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 3px;
            height: 7px;
            background: var(--bg);
            border-radius: 1px;
        }
        .mascot::before { left: 8px; }
        .mascot::after  { right: 8px; }
        .brand .name {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.02em;
        }
        /* Hero */
        .hero {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 56px 28px 96px;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 56px;
            align-items: center;
            flex: 1;
        }
        @media (max-width: 860px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 32px 22px 56px;
                gap: 40px;
                min-height: 0;
            }
        }
        .hero h1 {
            font-size: clamp(40px, 5.5vw, 64px);
            font-weight: 700;
            letter-spacing: -0.035em;
            line-height: 1.02;
            margin: 0 0 18px;
        }
        .hero h1 .accent {
            color: var(--claude);
        }
        .hero p.lede {
            font-size: 18px;
            color: var(--ink-dim);
            margin: 0 0 32px;
            max-width: 50ch;
            line-height: 1.5;
        }
        .hero .actions {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        a.btn {
            text-decoration: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            padding: 13px 22px;
            border-radius: 12px;
            transition: filter 180ms, box-shadow 180ms, background 180ms, color 180ms, transform 100ms;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        a.btn:active { transform: translateY(1px); }
        a.btn-primary {
            background: linear-gradient(180deg, var(--claude-2) 0%, var(--claude-3) 100%);
            color: #1a0d02;
            border: 1px solid var(--claude-3);
            box-shadow: 0 8px 18px -8px rgba(204, 120, 92, 0.45);
        }
        a.btn-primary:hover { filter: brightness(1.06); }
        /* Hero showcase (right side): the four characters in a watch frame */
        .showcase {
            display: grid;
            place-items: center;
        }
        .watch {
            position: relative;
            width: 320px;
            max-width: 100%;
            aspect-ratio: 4 / 5;
            background: linear-gradient(180deg, #1f1a13 0%, #14110c 100%);
            border-radius: 56px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 30px 60px -20px rgba(0, 0, 0, 0.6),
                0 60px 120px -30px rgba(204, 120, 92, 0.15);
            padding: 22px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .watch::before {
            content: '';
            position: absolute;
            top: 12px; right: 12px;
            width: 8px; height: 36px;
            background: #2c241b;
            border-radius: 4px;
        }
        .watch-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 36px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 12% 8% 10%;
            gap: 10px;
        }
        .watch-art {
            position: relative;
            flex: 1;
            min-height: 0;
            display: grid;
            place-items: center;
        }
        .watch-art img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 550ms ease-in-out;
        }
        .watch-art img.on { opacity: 1; }
        .watch-labels {
            position: relative;
            height: 22px;
            flex: 0 0 auto;
        }
        .watch-labels .lbl {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -0.01em;
            opacity: 0;
            transition: opacity 550ms ease-in-out;
        }
        .watch-labels .lbl.on { opacity: 1; }
        .watch-labels .state-idle     { color: #8f8575; }
        .watch-labels .state-working  { color: #ff9f52; }
        .watch-labels .state-approval { color: #5ba4ff; }
        .watch-labels .state-done     { color: #8ae66e; }

        footer {
            border-top: 1px solid var(--border);
            padding: 28px 28px 36px;
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--ink-faint);
        }
        footer a {
            color: var(--ink-muted);
            text-decoration: none;
            border-bottom: 1px dotted var(--border-2);
            padding-bottom: 1px;
            transition: color 160ms, border-color 160ms;
        }
        footer a:hover { color: var(--claude-2); border-bottom-color: var(--claude-2); }
    </style>
</head>
<body>
    <nav class="top">
        <a class="brand" href="/" style="text-decoration: none; color: inherit;">
            <div class="mascot" aria-hidden="true"></div>
            <span class="name">Cued</span>
        </a>
    </nav>

    <header class="hero">
        <div>
            <h1>A tap on your wrist when <span class="accent">your agent is ready</span>.</h1>
            <p class="lede">Cued watches your coding agent's lifecycle hooks and taps your Apple Watch the moment it finishes, needs your approval, or starts thinking on a new prompt.</p>
            <div class="actions">
                <a class="btn btn-primary" href="/p">Pair your watch →</a>
            </div>
        </div>
        <div class="showcase" aria-hidden="true">
            <div class="watch">
                <div class="watch-screen">
                    <div class="watch-art">
                        <img src="/img/idle.png"     alt="">
                        <img src="/img/working.png"  alt="" class="on">
                        <img src="/img/approval.png" alt="">
                        <img src="/img/done.png"     alt="">
                    </div>
                    <div class="watch-labels">
                        <span class="lbl state-idle">Idle</span>
                        <span class="lbl state-working on">Working…</span>
                        <span class="lbl state-approval">Needs you</span>
                        <span class="lbl state-done">Done</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <footer>
        <a href="https://ko-fi.com/rayray2006" target="_blank" rel="noopener">Buy me a coffee</a>
    </footer>

    <script>
        const imgs = Array.from(document.querySelectorAll('.watch-art img'))
        const lbls = Array.from(document.querySelectorAll('.watch-labels .lbl'))
        // Index of whichever sprite has the `on` class at page load.
        let i = imgs.findIndex((el) => el.classList.contains('on'))
        if (i < 0) i = 0
        setInterval(() => {
            imgs[i].classList.remove('on')
            lbls[i].classList.remove('on')
            i = (i + 1) % imgs.length
            imgs[i].classList.add('on')
            lbls[i].classList.add('on')
        }, 5200)
    </script>
</body>
</html>
